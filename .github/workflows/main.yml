name: Build Success Setu APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK (Final Fix)
        run: |
          # Android SDK ka rasta set karna zaroori hai
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          
          # Sab kuch automatically 'yes' karne ke liye
          yes | bubblewrap init --manifest=manifest.json --extracp=./
          
          # APK build karne ki command
          bubblewrap build --skipConfig
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SuccessSetu-APK
          path: "**/*.apk"
