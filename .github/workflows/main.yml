name: Build Success Setu APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build APK
        run: |
          npm install -g @bubblewrap/cli
          # Bina link ke seedha local file se build shuru karega
          yes | bubblewrap init --twa-manifest=twa-manifest.json
          bubblewrap build --skipConfig
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SuccessSetu-APK
          path: ./*.apk
