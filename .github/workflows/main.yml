name: Build Success Setu APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Android APK
        uses: pwa-builder/pwa-action@v2
        with:
          pwa-url: "https://kartiksinghania14357-creator.github.io/SuccessSetuApp/"
          android-package-id: "com.success.setu.app"
          android-app-name: "Success Setu"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SuccessSetu-APK
          path: ./**/*.apk
