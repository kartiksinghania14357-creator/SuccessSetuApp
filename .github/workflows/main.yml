name: Build Success Setu APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        run: |
          # Ye command bina link ke seedha files se APK banayegi
          yes | bubblewrap init --manifest=manifest.json --extracp=./
          bubblewrap build --skipConfig
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: success-setu-app
          path: ./*.apk
