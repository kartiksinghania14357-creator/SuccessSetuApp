name: Build Success Setu APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK from Web Content
        run: |
          # Ye command aapki index.html aur manifest.json ko app mein badal degi
          bubblewrap init --manifest=https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json
          bubblewrap build --skipConfig
          
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: success-setu-app
          path: "*.apk"
